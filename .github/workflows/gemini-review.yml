name: Gemini PR Review

on:
  workflow_call:
    inputs:
      additional_context:
        description: Optional review focus or instructions
        required: false
        type: string
      pull_request_number:
        description: Pull request number to review
        required: true
        type: string

concurrency:
  group: gemini-review-${{ github.repository }}-${{ inputs.pull_request_number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository context
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          persist-credentials: false

      - name: Prepare prompt context
        run: |-
          mkdir -p .gemini
          jq -n \
            --arg repo "${REPOSITORY}" \
            --arg pr "${PULL_REQUEST_NUMBER}" \
            --arg context "${ADDITIONAL_CONTEXT}" \
            '{repository: $repo, pull_request_number: $pr, additional_context: $context}' \
            > .gemini/context.json
        env:
          ADDITIONAL_CONTEXT: ${{ inputs.additional_context }}
          PULL_REQUEST_NUMBER: ${{ inputs.pull_request_number }}
          REPOSITORY: ${{ github.repository }}

      - name: Validate Gemini authentication
        run: |-
          if [[ -z "${GEMINI_API_KEY}" && -z "${GOOGLE_API_KEY}" && "${USE_VERTEX_AI}" != "true" && "${USE_CODE_ASSIST}" != "true" ]]; then
            echo "Gemini review requires GEMINI_API_KEY, GOOGLE_API_KEY, GOOGLE_GENAI_USE_VERTEXAI=true, or GOOGLE_GENAI_USE_GCA=true."
            exit 1
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          USE_CODE_ASSIST: ${{ vars.GOOGLE_GENAI_USE_GCA }}
          USE_VERTEX_AI: ${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}

      - name: Run Gemini pull request review
        id: gemini_pr_review
        uses: google-github-actions/run-gemini-cli@f77273f4c914e4bf38440cf36a0369cb64a37489
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_CLI_TRUST_WORKSPACE: true
          GITHUB_TOKEN: ${{ github.token }}
        with:
          extensions: |-
            [
              "https://github.com/gemini-cli-extensions/code-review"
            ]
          gcp_location: ${{ vars.GOOGLE_CLOUD_LOCATION }}
          gcp_project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}
          gcp_service_account: ${{ vars.SERVICE_ACCOUNT_EMAIL }}
          gcp_workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_cli_version: ${{ vars.GEMINI_CLI_VERSION }}
          gemini_debug: ${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}
          gemini_model: ${{ vars.GEMINI_MODEL }}
          github_pr_number: "${{ inputs.pull_request_number }}"
          google_api_key: ${{ secrets.GOOGLE_API_KEY }}
          prompt: /pr-code-review
          settings: |-
            {
              "model": {
                "maxSessionTurns": 25
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": []
              }
            }
          upload_artifacts: ${{ vars.UPLOAD_ARTIFACTS }}
          use_gemini_code_assist: ${{ vars.GOOGLE_GENAI_USE_GCA }}
          use_vertex_ai: ${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}
          workflow_name: gemini-review

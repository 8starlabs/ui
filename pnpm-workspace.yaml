# Supply-chain hardening: delay installing freshly published versions (7 days)
# so malware caught and unpublished within hours never lands, and fail installs
# when a package's trust signals (provenance/signatures) weaken between releases.
minimumReleaseAge: 10080
trustPolicy: no-downgrade
# Narrow exclusions: transitive deps of shadcn v4's babel toolchain whose older
# pinned versions predate provenance attestation. Excluded intentionally so the
# no-downgrade policy still guards everything else.
trustPolicyExclude:
  - "semver@6.3.1"
overrides:
  "@babel/core": "7.29.7"
  brace-expansion: "1.1.13"
  diff: "8.0.3"
  esbuild: ">=0.28.1"
  flatted: "3.4.2"
  js-yaml@^3.13.1: "3.15.0"
  js-yaml@^4.1.0: "4.3.0"
  js-yaml@^4.1.1: "4.3.0"
  minimatch@^3.1.2: "3.1.4"
  path-to-regexp: "8.4.0"
  picomatch@^2.0.0: "2.3.2"
  picomatch@^4.0.3: "4.0.4"
  postcss: "8.5.15"
  qs: "6.15.3"
  yaml: "2.8.3"
allowBuilds:
  "@tailwindcss/oxide": true
  esbuild: true
  msw: true
  sharp: true
  unrs-resolver: true
